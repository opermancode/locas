name: Build Windows Desktop App

on:
  push:
    tags:
      - 'desktop/v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#desktop/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Bump versions and fix dependencies
        shell: node {0}
        run: |
          const fs = require('fs');
          const v = '${{ steps.version.outputs.version }}';

          // Bump app.json version
          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          app.expo.version = v;
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2));

          // Bump package.json version + fix bad dependency versions
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = v;
          // These are corrected here so desktop npm install never hits ETARGET
          pkg.dependencies['expo-splash-screen'] = '~0.29.21';
          pkg.dependencies['react']              = '18.3.1';
          pkg.dependencies['react-dom']          = '18.3.1';
          pkg.dependencies['react-native']       = '0.76.9';
          if (!pkg.devDependencies) pkg.devDependencies = {};
          pkg.devDependencies['@types/react']    = '~18.3.0';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));

          // Update version.json for in-app update check
          const versionJson = {
            version: v,
            downloadPage: `https://github.com/${{ github.repository }}/releases/tag/desktop%2Fv${v}`,
            releaseNotes: `Locas Desktop v${v}`,
          };
          fs.writeFileSync('version.json', JSON.stringify(versionJson, null, 2));
          console.log('Bumped to version:', v);

      - name: Commit version bumps
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json package.json version.json
          git diff --staged --quiet || git commit -m "chore: bump desktop to v${{ steps.version.outputs.version }}"
          git push origin HEAD:main || true

      - name: Install app dependencies
        run: npm install --legacy-peer-deps

      - name: Build Expo web bundle
        run: npx expo export --output-dir electron/dist --platform web

      - name: Fix asset paths for Electron (file:// protocol)
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const indexPath = path.join('electron', 'dist', 'index.html');
          let html = fs.readFileSync(indexPath, 'utf8');
          html = html.replace(/src="\//g, 'src="./');
          html = html.replace(/href="\//g, 'href="./');
          html = html.replace(/src='\//g, "src='./");
          html = html.replace(/href='\//g, "href='./");
          html = html.replace(/url\(\//g, 'url(./');
          fs.writeFileSync(indexPath, html);
          console.log('Fixed asset paths in index.html');

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Build Windows installer
        working-directory: electron
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: electron/dist-electron/*.exe
          tag_name: ${{ github.ref_name }}
          name: "Locas Desktop v${{ steps.version.outputs.version }}"
          body: |
            ## Locas Desktop v${{ steps.version.outputs.version }}

            ### Installation
            1. Download `Locas-Setup-${{ steps.version.outputs.version }}.exe`
            2. Run the installer
            3. Launch Locas from Desktop shortcut
            4. Login with your Locas credentials

            ### Requirements
            - Windows 10 or later
            - Internet connection for first login only
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}