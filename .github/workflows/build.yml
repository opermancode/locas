name: EAS APK Build

on:
  push:
    branches:
      - 'apk/v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK (preview)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 1: Patch environment (Pinning everything to SDK 54 standards)
      - name: Patch environment and bump versions
        run: |
          node -e "
            const fs = require('fs');
            const v = '${{ steps.version.outputs.version }}';

            // 1. Update app.json
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = v;
            // Remove versionCode as EAS remote handles this now
            if (app.expo.android) delete app.expo.android.versionCode; 
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));

            // 2. Update package.json
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = v;
            
            // Fix Splash Screen
            pkg.dependencies['expo-splash-screen'] = '~0.29.21';

            // STRICT DOWNGRADE TO REACT 18 (Required for SDK 54 Bundler)
            pkg.dependencies['react'] = '18.3.1';
            pkg.dependencies['react-dom'] = '18.3.1';
            if (!pkg.devDependencies) pkg.devDependencies = {};
            pkg.devDependencies['@types/react'] = '~18.3.0';

            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));

            // 3. Fix eas.json
            if (fs.existsSync('eas.json')) {
              const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
              if (!eas.cli) eas.cli = {};
              eas.cli.appVersionSource = 'remote';
              fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2));
            }
          "

      # Step 2: Fresh Install (Nuclear Option)
      - name: Clean Install
        env:
          NPM_CONFIG_LEGACY_PEER_DEPS: true
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install --global eas-cli

      # Step 3: Build APK on EAS with Mandatory Cache Clear
      - name: Build preview APK
        id: build
        run: |
          # Use --clear-cache to ensure EAS doesn't use old React 19 artifacts
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --clear-cache \
            2>&1 | tee /tmp/eas_output.txt
          
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            exit 1
          fi

          APK_URL=$(grep -o 'https://expo\.dev/artifacts[^ ]*\.apk' /tmp/eas_output.txt | tail -1 || echo "")
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # Step 4: Update version.json and commit
      - name: Update version.json and commit
        run: |
          node -e "
            const fs = require('fs');
            fs.writeFileSync('version.json', JSON.stringify({
              version: '${{ steps.version.outputs.version }}',
              url: '${{ steps.build.outputs.apk_url }}',
              downloadPage: 'https://appdistribution.firebase.dev/i/aa46bb1c4e9a8dec',
              releaseNotes: 'Version ${{ steps.version.outputs.version }}'
            }, null, 2));
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json package.json version.json eas.json
          git diff --staged --quiet || git commit -m "chore: build v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
