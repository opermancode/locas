name: EAS APK Build

on:
  push:
    branches:
      - 'apk/v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK (preview)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract version from branch
        id: version
        run: |
          BRANCH="${{ github.ref_name }}"
          VERSION="${BRANCH#apk/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      # Use python (always available on ubuntu-latest) — no shell quoting issues
      - name: Bump versions
        run: |
          python3 - << 'PY'
          import json, os, sys
          v = os.environ['VERSION']
          if not v:
              print("ERROR: VERSION is empty"); sys.exit(1)

          with open('app.json', 'r') as f:
              app = json.load(f)
          app['expo']['version'] = v
          app['expo']['android']['versionCode'] = (app['expo']['android'].get('versionCode') or 0) + 1
          with open('app.json', 'w') as f:
              json.dump(app, f, indent=2)
              f.write('\n')

          with open('package.json', 'r') as f:
              pkg = json.load(f)
          pkg['version'] = v
          with open('package.json', 'w') as f:
              json.dump(pkg, f, indent=2)
              f.write('\n')

          print(f"Bumped to version: {v} | versionCode: {app['expo']['android']['versionCode']}")
          PY
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install --global eas-cli

      - name: Build preview APK
        id: build
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --clear-cache \
            2>&1 | tee /tmp/eas_output.txt

          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== EAS full output ==="
            cat /tmp/eas_output.txt
            exit 1
          fi

          APK_URL=$(grep -o 'https://expo\.dev/artifacts[^ ]*\.apk' /tmp/eas_output.txt | tail -1 || echo "")
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
          echo "APK URL: $APK_URL"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Update version.json
        run: |
          python3 - << 'PY'
          import json, os
          v   = os.environ['VERSION']
          url = os.environ.get('APK_URL', '')
          with open('version.json', 'w') as f:
              json.dump({
                  'version': v,
                  'url': url,
                  'downloadPage': 'https://appdistribution.firebase.dev/i/aa46bb1c4e9a8dec',
                  'releaseNotes': f'Version {v}'
              }, f, indent=2)
              f.write('\n')
          print(f'version.json updated to {v}')
          PY
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APK_URL:  ${{ steps.build.outputs.apk_url }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json package.json version.json
          git diff --staged --quiet || git commit -m "chore: bump to v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
