name: EAS APK Build

on:
  push:
    tags:
      - 'apk/v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK (preview)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix and deduplicate Expo packages
        run: npx expo install --fix --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install --global eas-cli

      - name: Build preview APK
        id: build
        run: |
          BUILD_JSON=$(eas build --platform android --profile preview --non-interactive --json --wait)
          APK_URL=$(echo "$BUILD_JSON" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d)[0]?.artifacts?.buildUrl || '')")
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#apk/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version.json
        run: |
          node -e "
            const fs = require('fs');
            const data = {
              version: '${{ steps.version.outputs.version }}',
              url: '${{ steps.build.outputs.apk_url }}',
              releaseNotes: 'Version ${{ steps.version.outputs.version }}'
            };
            fs.writeFileSync('version.json', JSON.stringify(data, null, 2));
          "

      - name: Commit version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore: update version.json to ${{ steps.version.outputs.version }}"
          git push origin HEAD:main