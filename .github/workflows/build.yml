name: EAS APK Build

on:
  push:
    branches:
      - 'apk/v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK (preview)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Extract version from branch
        id: version
        run: |
          BRANCH="${{ github.ref_name }}"
          VERSION="${BRANCH#apk/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Step 1: Patch environment and bump versions
      - name: Patch environment and bump versions
        run: |
          node -e "
            const fs = require('fs');
            const v = '${{ steps.version.outputs.version }}';

            // 1. Update app.json
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = v;
            app.expo.android.versionCode = (app.expo.android.versionCode || 1) + 1;
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));

            // 2. Update package.json
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = v;
            
            // Fix: expo-splash-screen version correction
            if (pkg.dependencies['expo-splash-screen']) {
              pkg.dependencies['expo-splash-screen'] = '~0.29.21';
            }

            // Fix: Pin React 18 for SDK 54 stability
            pkg.dependencies['react'] = '18.3.1';
            pkg.dependencies['react-dom'] = '18.3.1';
            
            if (!pkg.devDependencies) pkg.devDependencies = {};
            pkg.devDependencies['@types/react'] = '~18.3.0';

            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));

            // 3. Fix eas.json warning
            if (fs.existsSync('eas.json')) {
              const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
              if (!eas.build) eas.build = {};
              if (!eas.build.preview) eas.build.preview = {};
              eas.build.preview.appVersionSource = 'remote';
              fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2));
            }
          "

      # Step 2: Install dependencies with global peer-dependency bypass
      - name: Install dependencies
        env:
          NPM_CONFIG_LEGACY_PEER_DEPS: true
        run: |
          npm install --legacy-peer-deps

      - name: Verify Expo package alignment
        env:
          NPM_CONFIG_LEGACY_PEER_DEPS: true
        run: CI=1 npx expo install --fix

      - name: Install EAS CLI
        run: npm install --global eas-cli

      # Step 3: Build APK on EAS
      - name: Build preview APK
        id: build
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --clear-cache \
            2>&1 | tee /tmp/eas_output.txt
          
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            exit 1
          fi

          APK_URL=$(grep -o 'https://expo\.dev/artifacts[^ ]*\.apk' /tmp/eas_output.txt | tail -1 || echo "")
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # Step 4: Update and Commit
      - name: Update version.json and commit
        run: |
          node -e "
            const fs = require('fs');
            fs.writeFileSync('version.json', JSON.stringify({
              version: '${{ steps.version.outputs.version }}',
              url: '${{ steps.build.outputs.apk_url }}',
              downloadPage: 'https://appdistribution.firebase.dev/i/aa46bb1c4e9a8dec',
              releaseNotes: 'Version ${{ steps.version.outputs.version }}'
            }, null, 2));
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json package.json version.json eas.json
          git diff --staged --quiet || git commit -m "chore: build v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
