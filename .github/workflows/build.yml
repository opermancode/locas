name: EAS APK Build

on:
  push:
    branches:
      - 'apk/v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK (preview)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── THIS STEP WAS MISSING — caused empty version string ──
      - name: Extract version from branch
        id: version
        run: |
          BRANCH="${{ github.ref_name }}"
          VERSION="${BRANCH#apk/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      # Bump version numbers in app.json and package.json
      - name: Bump versions
        run: |
          node -e "
            const fs = require('fs');
            const v = '${{ steps.version.outputs.version }}';

            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = v;
            app.expo.android.versionCode = (app.expo.android.versionCode || 1) + 1;
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));

            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));

            console.log('Bumped to version:', v, '| versionCode:', app.expo.android.versionCode);
          "

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix Expo package versions
        run: npx expo install --fix --non-interactive

      - name: Install EAS CLI
        run: npm install --global eas-cli

      - name: Build preview APK
        id: build
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --clear-cache \
            2>&1 | tee /tmp/eas_output.txt

          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== EAS full output ==="
            cat /tmp/eas_output.txt
            exit 1
          fi

          APK_URL=$(grep -o 'https://expo\.dev/artifacts[^ ]*\.apk' /tmp/eas_output.txt | tail -1 || echo "")
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
          echo "APK URL: $APK_URL"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Update version.json and commit
        run: |
          node -e "
            const fs = require('fs');
            fs.writeFileSync('version.json', JSON.stringify({
              version: '${{ steps.version.outputs.version }}',
              url: '${{ steps.build.outputs.apk_url }}',
              downloadPage: 'https://appdistribution.firebase.dev/i/aa46bb1c4e9a8dec',
              releaseNotes: 'Version ${{ steps.version.outputs.version }}'
            }, null, 2));
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json package.json version.json
          git diff --staged --quiet || git commit -m "chore: bump to v${{ steps.version.outputs.version }}"
          git push origin HEAD:main